name: Deploy to Hostinger

on:
  push:
    branches:
      - master
      - dev

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}       # ftp.hivago.in
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp                          # more stable than ftps for now
          port: 21

          local-dir: ./dist/                     # build output
          server-dir: ./                         # ⚡ correct (maps to public_html)

          dangerous-clean-slate: false           # ❌ don’t wipe server
          timeout: 60000
          retries: 3